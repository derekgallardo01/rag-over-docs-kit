name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install --quiet pytest
      - name: Unit tests
        run: python -m pytest -q
      - name: Eval harness — workplace corpus (HR / refunds / security)
        run: python evals/run.py
      - name: Eval harness — technical docs corpus (auth / rate-limits / webhooks)
        run: python evals/run.py golden-tech.json data-tech
      - name: Smoke-test the demo
        run: python run.py
